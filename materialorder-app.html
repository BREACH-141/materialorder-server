const TIMBER_HINTS = ["timber", "joist", "stud", "truss", "skirting", "architrave", "batten", "plywood", "mdf"];
const PLUMBING_ELECTRICAL_HINTS = ["pipework", "cable", "electrical", "sanitaryware", "socket", "switch", "plumbing"];

function suppliersForMaterial(materialName) {
  const lower = materialName.toLowerCase();
  const isTimber = TIMBER_HINTS.some((h) => lower.includes(h));
  const isPlumbElec = PLUMBING_ELECTRICAL_HINTS.some((h) => lower.includes(h));
  if (isTimber) return SUPPLIERS.filter((s) => s.category === "timber" || s.category === "general");
  if (isPlumbElec) return SUPPLIERS.filter((s) => s.category === "plumbing_electrical" || s.category === "general");
  return SUPPLIERS.filter((s) => s.category === "general");
}

// Looks up matching real UK postcodes via postcodes.io (free, open, no key required)
// so the builder can confirm they've typed a postcode that actually exists, rather
// than relying on us to guess. Debounced by the caller.
async function fetchPostcodeMatches(partial) {
  const cleaned = partial.replace(/\s+/g, "");
  if (cleaned.length < 3) return [];
  try {
    const res = await fetch(`https://api.postcodes.io/postcodes/${encodeURIComponent(cleaned)}/autocomplete?limit=6`);
    const data = await res.json();
    return data && data.result ? data.result : [];
  } catch (e) {
    return [];
  }
}

async function lookupPostcodeDetail(postcode) {
  const cleaned = postcode.trim();
  if (!cleaned) return null;
  try {
    const res = await fetch(`https://api.postcodes.io/postcodes/${encodeURIComponent(cleaned)}`);
    const data = await res.json();
    if (data && data.status === 200 && data.result) {
      return {
        postcode: data.result.postcode,
        district: data.result.admin_district,
        ward: data.result.admin_ward,
        region: data.result.region,
      };
    }
    return null;
  } catch (e) {
    return null;
  }
}

function seedRandom(seed) {
  let s = seed;
  return () => {
    s = (s * 9301 + 49297) % 233280;
    return s / 233280;
  };
}

function basePriceFor(materialName) {
  let hash = 0;
  for (let i = 0; i < materialName.length; i++) hash = (hash * 31 + materialName.charCodeAt(i)) % 9973;
  return 12 + (hash % 180);
}

function generateQuotes(materials, scale, timeframe, bufferPct) {
  const mult = SCALE_MULTIPLIER[scale] || 1;
  const rng = seedRandom(materials.length * 17 + (scale || "").length);
  const buf = 1 + (Number(bufferPct) || 0) / 100;
  return materials.map((m) => {
    const name = typeof m === "string" ? m : m.name;
    const base = basePriceFor(name);
    const estimatedQty = Math.max(1, Math.round((4 + rng() * 12) * mult));
    const requestedQty = typeof m === "object" && m.requestedQty ? m.requestedQty : null;
    const qty = requestedQty ? Math.ceil(requestedQty * buf) : Math.ceil(estimatedQty * buf);
    const relevantSuppliers = suppliersForMaterial(name);
    const offers = relevantSuppliers.map((s) => {
      const jitter = 0.9 + rng() * 0.2;
      const unitPrice = +(base * s.priceIndex * jitter).toFixed(2);
      let leadDays = s.speed === "fast" ? 2 + Math.round(rng() * 2) : s.speed === "standard" ? 4 + Math.round(rng() * 3) : 7 + Math.round(rng() * 4);
      if (timeframe === "urgent") leadDays = Math.max(1, leadDays - 2);
      const fitsTimeframe =
        timeframe === "urgent" ? leadDays <= 5 : timeframe === "soon" ? leadDays <= 10 : true;
      // SIMULATED stock check — no UK builders' merchant exposes a public live-stock
      // API, so this is a deterministic demo signal (seeded, not random per render)
      // standing in for what a real stock-check call would return.
      const stockRoll = rng();
      const inStock = stockRoll > 0.18;
      const stockQty = inStock ? Math.max(qty, Math.round(qty * (1 + rng() * 3))) : Math.floor(qty * rng() * 0.6);
      return { ...s, unitPrice, leadDays, fitsTimeframe, lineTotal: +(unitPrice * qty).toFixed(2), inStock, stockQty };
    });
    return { material: name, qty, requestedQty, offers };
  });
}

function buildBundles(quotes, timeframe) {
  // Stock-aware pool: prefer offers that fit the timeframe AND are in stock.
  // If nothing fits both, relax timeframe first, then relax stock as a last resort
  // (so the app always returns something, but tells you when it had to compromise).
  const eligible = (offers) => {
    const fitsAndStocked = offers.filter((o) => o.fitsTimeframe && o.inStock);
    if (fitsAndStocked.length) return { pool: fitsAndStocked, relaxed: false };
    const stockedOnly = offers.filter((o) => o.inStock);
    if (stockedOnly.length) return { pool: stockedOnly, relaxed: "timeframe" };
    const fitsOnly = offers.filter((o) => o.fitsTimeframe);
    if (fitsOnly.length) return { pool: fitsOnly, relaxed: "stock" };
    return { pool: offers, relaxed: "stock" };
  };

  const pickBundle = (scoreFn) =>
    quotes.map((q) => {
      const { pool, relaxed } = eligible(q.offers);
      const best = pool.reduce((a, b) => (scoreFn(a) < scoreFn(b) ? a : b));
      // Did we have to move off the single best-scoring offer overall because it was out of stock?
      const idealOverall = q.offers.reduce((a, b) => (scoreFn(a) < scoreFn(b) ? a : b));
      const substituted = idealOverall.name !== best.name && !idealOverall.inStock;
      return { ...q, chosen: best, substituted, substitutedFrom: substituted ? idealOverall.name : null, relaxed };
    });

  const cheapest = pickBundle((o) => o.lineTotal);
  const fastest = pickBundle((o) => o.leadDays);
  const balanced = pickBundle((o) => o.lineTotal / 100 + o.leadDays * 3 - o.reliability * 5);

  const totalOf = (bundle) => bundle.reduce((sum, q) => sum + q.chosen.lineTotal, 0);
  const maxLeadOf = (bundle) => Math.max(...bundle.map((q) => q.chosen.leadDays));
  const supplierCountOf = (bundle) => new Set(bundle.map((q) => q.chosen.name)).size;
  const substitutionCountOf = (bundle) => bundle.filter((q) => q.substituted).length;

  return [
    {
      id: "lowest-cost",
      label: "Lowest cost",
      icon: "coin",
      desc: "Cheapest in-stock offer per item, mixed across suppliers",
      items: cheapest,
      total: totalOf(cheapest),
      maxLead: maxLeadOf(cheapest),
      supplierCount: supplierCountOf(cheapest),
      substitutionCount: substitutionCountOf(cheapest),
    },
    {
      id: "fastest",
      label: "Fastest delivery",
      icon: "bolt",
      desc: "Shortest lead time per in-stock item, cost is secondary",
      items: fastest,
      total: totalOf(fastest),
      maxLead: maxLeadOf(fastest),
      supplierCount: supplierCountOf(fastest),
      substitutionCount: substitutionCountOf(fastest),
    },
    {
      id: "balanced",
      label: "Balanced",
      icon: "scale",
      desc: "Best mix of price, speed, stock and supplier reliability",
      items: balanced,
      total: totalOf(balanced),
      maxLead: maxLeadOf(balanced),
      supplierCount: supplierCountOf(balanced),
      substitutionCount: substitutionCountOf(balanced),
    },
  ];
}

function PostcodeField({ postcode, setPostcode, confirmed, setConfirmed }) {
  const [suggestions, setSuggestions] = useState([]);
  const [checking, setChecking] = useState(false);
  const [detail, setDetail] = useState(null);
  const [notFound, setNotFound] = useState(false);

  React.useEffect(() => {
    setConfirmed(false);
    setDetail(null);
    setNotFound(false);
    if (postcode.trim().length < 3) {
      setSuggestions([]);
      return;
    }
    setChecking(true);
    const handle = setTimeout(async () => {
      const matches = await fetchPostcodeMatches(postcode);
      setSuggestions(matches);
      setChecking(false);
    }, 350);
    return () => clearTimeout(handle);
  }, [postcode]);

  const selectSuggestion = async (pc) => {
    setPostcode(pc);
    setSuggestions([]);
    setChecking(true);
    const d = await lookupPostcodeDetail(pc);
    setChecking(false);
    if (d) {
      setDetail(d);
      setConfirmed(true);
      setNotFound(false);
    } else {
      setNotFound(true);
      setConfirmed(false);
    }
  };

  return (
    <div style={{ position: "relative" }}>
      <label style={labelStyle}>Site postcode</label>
      <input
        value={postcode}
        onChange={(e) => setPostcode(e.target.value)}
        placeholder="e.g. E11 4EL"
        style={{ ...inputStyle, borderColor: confirmed ? GREEN : notFound ? "#C0392B" : "#D8D3C6" }}
      />
      {checking && <p style={{ fontSize: 11, color: AGGREGATE, marginTop: 4 }}>Checking postcode…</p>}
      {!checking && suggestions.length > 0 && (
        <div
          style={{
            position: "absolute",
            zIndex: 5,
            background: "#fff",
            border: "1.5px solid #D8D3C6",
            borderRadius: 4,
            marginTop: 2,
            width: "100%",
            maxWidth: 320,
            boxShadow: "0 4px 10px rgba(0,0,0,0.08)",
          }}
        >
          {suggestions.map((s) => (
            <div
              key={s}
              onClick={() => selectSuggestion(s)}
              style={{ padding: "8px 12px", fontSize: 13, cursor: "pointer", borderBottom: "1px solid #EEEAE0" }}
              onMouseDown={(e) => e.preventDefault()}
            >
              {s}
            </div>
          ))}
        </div>
      )}
      {confirmed && detail && (
        <p style={{ fontSize: 12, color: GREEN, marginTop: 6, fontWeight: 600 }}>
          ✓ Confirmed: {detail.postcode} · {detail.district}, {detail.region}
        </p>
      )}
      {notFound && (
        <p style={{ fontSize: 12, color: "#C0392B", marginTop: 6 }}>
          We couldn't confirm that postcode — check it and select it from the suggestions above.
        </p>
      )}
      {!confirmed && !notFound && !checking && postcode.trim().length >= 3 && suggestions.length === 0 && (
        <p style={{ fontSize: 11, color: AGGREGATE, marginTop: 4 }}>No matches yet — keep typing.</p>
      )}
    </div>
  );
}

function InquiryForm({ onSubmit, prefillItems, resourcingFrom, resourcingNote }) {
  const [path, setPath] = useState(null); // 'expert' | 'guided'
  const [propertyType, setPropertyType] = useState("");
  const [scale, setScale] = useState("");
  const [stages, setStages] = useState([]);
  const [fullHouse, setFullHouse] = useState(false);
  const [expertItems, setExpertItems] = useState([{ name: "", qty: "" }]);
  const [timeframe, setTimeframe] = useState("");
  const [budgetPriority, setBudgetPriority] = useState("");
  const [houseNumberStreet, setHouseNumberStreet] = useState("");
  const [postcode, setPostcode] = useState("");
  const [postcodeConfirmed, setPostcodeConfirmed] = useState(false);
  const [access, setAccess] = useState([]);
  const [accessDetails, setAccessDetails] = useState({});
  const [buffer, setBuffer] = useState("");
  const [showMissing, setShowMissing] = useState(false);

  React.useEffect(() => {
    if (!prefillItems || prefillItems.length === 0) return;
    setPath("expert");
    setExpertItems(prefillItems.map((it) => ({ name: it.material, qty: String(it.qty) })));
  }, [prefillItems]);

  const toggleStage = (s) => {
    setFullHouse(false);
    setStages((prev) => (prev.includes(s) ? prev.filter((x) => x !== s) : [...prev, s]));
  };

  const selectFullHouse = () => {
    setFullHouse(true);
    setStages(ALL_STAGE_IDS);
  };

  const toggleAccess = (a) =>
    setAccess((prev) => {
      const next = prev.includes(a) ? prev.filter((x) => x !== a) : [...prev, a];
      if (prev.includes(a)) {
        setAccessDetails((d) => {
          const copy = { ...d };
          delete copy[a];
          return copy;
        });
      }
      return next;
    });

  const setAccessDetail = (a, text) => setAccessDetails((d) => ({ ...d, [a]: text }));

  const updateExpertItem = (idx, field, value) => {
    setExpertItems((prev) => prev.map((it, i) => (i === idx ? { ...it, [field]: value } : it)));
  };
  const addExpertItem = () => setExpertItems((prev) => [...prev, { name: "", qty: "" }]);
  const removeExpertItem = (idx) => setExpertItems((prev) => (prev.length > 1 ? prev.filter((_, i) => i !== idx) : prev));

  const expertItemsValid =
    expertItems.length > 0 && expertItems.every((it) => it.name.trim().length > 1 && it.qty.toString().trim().length > 0 && Number(it.qty) > 0);

  // Every access constraint that's been selected must have its detail box filled in.
  const accessDetailsComplete = access.every((a) => (accessDetails[a] || "").trim().length > 0);

  const addressComplete = houseNumberStreet.trim().length > 2 && postcode.trim().length > 1 && postcodeConfirmed;

  // Build a precise list of what's still missing, in the order it appears on the form,
  // so the person can see exactly what to fix instead of guessing why the button is greyed out.
  const missingFields = [];
  if (!path) missingFields.push("Choose whether you know your materials or need guidance");
  if (path === "expert") {
    if (!expertItemsValid) {
      const badRow = expertItems.findIndex((it) => !(it.name.trim().length > 1 && it.qty.toString().trim().length > 0 && Number(it.qty) > 0));
      missingFields.push(
        badRow === -1
          ? "Add at least one material with a name and quantity"
          : `Material row ${badRow + 1}: needs both a name and a quantity greater than 0`
      );
    }
    if (!scale) missingFields.push("Select the scale of the project");
  }
  if (path === "guided") {
    if (!propertyType) missingFields.push("Select the property type");
    if (!scale) missingFields.push("Select the scale of the build");
    if (stages.length === 0) missingFields.push("Select at least one build stage, or 'starting from scratch'");
  }
  if (path && !timeframe) missingFields.push("Select when you need materials on site");
  if (path && !budgetPriority) missingFields.push("Select what matters most (cost, speed or balance)");
  if (path && houseNumberStreet.trim().length <= 2) missingFields.push("Enter the house number & street");
  if (path && postcode.trim().length <= 1) missingFields.push("Enter the site postcode");
  else if (path && !postcodeConfirmed) missingFields.push("Confirm the postcode by selecting it from the suggestions list");
  if (path && !buffer) missingFields.push("Select a waste / buffer allowance");
  if (path && !accessDetailsComplete) {
    const missingAccess = access.filter((a) => !(accessDetails[a] || "").trim().length > 0);
    missingAccess.forEach((a) => {
      const label = ACCESS_OPTIONS.find(([id]) => id === a)?.[1] || a;
      missingFields.push(`Describe the access constraint: ${label}`);
    });
  }

  const canSubmit = missingFields.length === 0;

  React.useEffect(() => {
    if (canSubmit) setShowMissing(false);
  }, [canSubmit]);

  const handleSubmit = () => {
    if (!canSubmit) {
      setShowMissing(true);
      return;
    }
    let materials = [];
    if (path === "expert") {
      materials = expertItems
        .filter((it) => it.name.trim())
        .map((it) => ({ name: it.name.trim(), requestedQty: Number(it.qty) }));
    } else {
      const set = new Set();
      stages.forEach((s) => (STAGE_MATERIALS[s] || []).forEach((m) => set.add(m)));
      materials = Array.from(set).map((name) => ({ name, requestedQty: null }));
    }
    onSubmit({
      path,
      propertyType,
      scale,
      stages,
      fullHouse,
      materials,
      timeframe,
      budgetPriority,
      address: `${houseNumberStreet.trim()}, ${postcode.trim().toUpperCase()}`,
      postcode,
      access,
      accessDetails,
      buffer,

const TRACK_STAGES = ["Order confirmed", "Preparing dispatch", "Out for delivery", "Delivered to site"];

function groupOrderBySupplier(order) {
  const map = {};
  order.items.forEach((it) => {
    const key = it.chosen.name;
    if (!map[key]) map[key] = { supplier: it.chosen, items: [] };
    map[key].items.push({ material: it.material, qty: it.qty });
  });
  return Object.values(map);
}

function StockCheckView({ order, inquiry, orderNumber, onAllConfirmed, onBack, onResource, builderEmail, onBuilderEmailChange, projectName, onProjectNameChange, onBackToDashboard }) {
  const groups = useMemo(() => groupOrderBySupplier(order), [order]);
  const [emails, setEmails] = useState(() => Object.fromEntries(groups.map((g) => [g.supplier.name, g.supplier.email || ""])));
  const [sendState, setSendState] = useState("idle"); // idle | sending | sent | error
  const [sendError, setSendError] = useState("");
  const [results, setResults] = useState(null); // per-supplier send results from backend
  const [orderStatus, setOrderStatus] = useState(null); // polled reply status
  const [polling, setPolling] = useState(false);

  const builderEmailValid = /\S+@\S+\.\S+/.test(builderEmail || "");
  const allEmailsValid = builderEmailValid && groups.every((g) => /\S+@\S+\.\S+/.test(emails[g.supplier.name] || ""));

  const updateEmail = (supplierName, value) => setEmails((prev) => ({ ...prev, [supplierName]: value }));

  const sendStockChecks = async () => {
    setSendState("sending");
    setSendError("");
    try {
      const res = await fetch(`${API_BASE_URL}/api/stock-check`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          orderNumber,
          projectName,
          deliveryAddress: inquiry.address,
          timeframe: inquiry.timeframe,
          builderEmail,
          suppliers: groups.map((g) => ({
            name: g.supplier.name,
            email: emails[g.supplier.name],
            items: g.items,
          })),
        }),
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || `Server responded with ${res.status}`);
      }
      const data = await res.json();
      setResults(data.results);
      setSendState("sent");
      setPolling(true);
    } catch (e) {
      setSendState("error");
      setSendError(
        e.message === "Failed to fetch"
          ? "Couldn't reach the MaterialOrder server. Make sure it's running and API_BASE_URL is set correctly."
          : e.message
      );
    }
  };

  React.useEffect(() => {
    if (!polling) return;
    const interval = setInterval(async () => {
      try {
        const res = await fetch(`${API_BASE_URL}/api/orders/${encodeURIComponent(orderNumber)}`);
        if (!res.ok) return;
        const data = await res.json();
        setOrderStatus(data);
        const allReplied = Object.values(data.suppliers).every((s) => s.status !== "sent");
        if (allReplied) setPolling(false);
      } catch (e) {
        // Silent — keep polling, the server might just be momentarily unreachable.
      }
    }, 4000);
    return () => clearInterval(interval);
  }, [polling, orderNumber]);

  const statusFor = (supplierName) => {
    if (!orderStatus) return null;
    const entry = Object.values(orderStatus.suppliers).find((s) => s.supplierName === supplierName);
    return entry || null;
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
        <div>
          <Docket>{orderNumber}</Docket>
          <p style={{ margin: "10px 0 0", fontSize: 13, color: AGGREGATE, maxWidth: 480 }}>
            We'll email each supplier the exact items and quantities and ask them to confirm stock. No phone
            call needed — though you're always free to call instead if you'd rather.
          </p>
        </div>
        <button onClick={onBack} style={ghostBtnStyle}>
          ← Back to bundles
        </button>
      </div>

      {sendState !== "sent" && (
        <div style={{ marginTop: 24 }}>
          <SectionLabel n="·">Project name</SectionLabel>
          <p style={{ fontSize: 12, color: AGGREGATE, marginTop: -8, marginBottom: 10, maxWidth: 520 }}>
            Give this enquiry a name so you can find it easily on the dashboard.
          </p>
          <input
            type="text"
            value={projectName}
            onChange={(e) => onProjectNameChange(e.target.value)}
            placeholder="e.g. Loft conversion — 47 Maple St"
            style={{ ...inputStyle, marginBottom: 20, maxWidth: 400 }}
          />
          <SectionLabel n="·">Your email address</SectionLabel>
          <p style={{ fontSize: 12, color: AGGREGATE, marginTop: -8, marginBottom: 10, maxWidth: 520 }}>
            We'll email you as soon as each supplier replies — no need to keep this page open.
          </p>
          <input
            type="email"
            value={builderEmail}
            onChange={(e) => onBuilderEmailChange(e.target.value)}
            placeholder="your@email.com"
            style={{ ...inputStyle, marginBottom: 20, maxWidth: 320 }}
          />
          {groups.some((g) => !g.supplier.email) && (
            <>
              <SectionLabel n="·">Confirm supplier email addresses</SectionLabel>
              <p style={{ fontSize: 12, color: AGGREGATE, marginTop: -8, marginBottom: 14, maxWidth: 520 }}>
                Some merchants don't have an email on file yet. Add it below, then save it in the SUPPLIERS
                list at the top of this file so you won't be asked again. If you don't have one, call the
                supplier — their number is shown below — and ask, or check their website.
              </p>
            </>
          )}
          {groups.map((g) => (
            <div key={g.supplier.name} style={{ background: "#fff", border: "1.5px solid #D8D3C6", borderRadius: 6, padding: "14px 16px", marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 8 }}>
                <div>
                  <p style={{ margin: 0, fontWeight: 700, fontSize: 14 }}>{g.supplier.name}</p>
                  <p style={{ margin: "2px 0 0", fontSize: 12, color: AGGREGATE }}>
                    {g.items.length} item{g.items.length > 1 ? "s" : ""} · {g.items.map((it) => it.material).join(", ")}
                  </p>
                  <a href={telLink(g.supplier.phone)} style={{ fontSize: 12, fontWeight: 600, color: ORANGE, textDecoration: "none" }}>
                    {g.supplier.email ? `📞 ${g.supplier.phone}` : `Or call ${g.supplier.phone}`}
                  </a>
                </div>
                {g.supplier.email ? (
                  <p style={{ margin: 0, fontSize: 13, color: AGGREGATE, alignSelf: "center" }}>{g.supplier.email}</p>
                ) : (
                  <input
                    type="email"
                    value={emails[g.supplier.name]}
                    onChange={(e) => updateEmail(g.supplier.name, e.target.value)}
                    placeholder="supplier@example.com"
                    style={{ ...inputStyle, marginTop: 0, width: 220 }}
                  />
                )}
              </div>
            </div>
          ))}

          <button
            onClick={sendStockChecks}
            disabled={!allEmailsValid || sendState === "sending"}
            style={{
              marginTop: 10,
              padding: "13px 26px",
              borderRadius: 4,
              border: "none",
              background: allEmailsValid ? CHARCOAL : "#D8D3C6",
              color: allEmailsValid ? CREAM : "#8A8579",
              fontWeight: 700,
              fontSize: 14,
              letterSpacing: 0.3,
              cursor: allEmailsValid ? "pointer" : "not-allowed",
              width: "100%",
            }}
          >
            {sendState === "sending" ? "Sending…" : "Send stock-check emails →"}
          </button>

          {sendState === "error" && (
            <p style={{ fontSize: 13, color: "#C0392B", marginTop: 10 }}>{sendError}</p>
          )}
        </div>
      )}

      {sendState === "sent" && (
        <div style={{ marginTop: 24 }}>
          <SectionLabel n="·">Awaiting supplier replies</SectionLabel>
          <p style={{ fontSize: 12, color: AGGREGATE, marginTop: -8, marginBottom: 14, maxWidth: 520 }}>
            Each supplier received an email with a one-tap link to confirm stock — no account needed on their
            end. This page checks for replies every few seconds.
          </p>
          {groups.map((g) => {
            const result = results && results.find((r) => r.supplier === g.supplier.name);
            const status = statusFor(g.supplier.name);
            const replyStatus = status ? status.status : result && result.sent ? "sent" : "failed";
            const badge =
              replyStatus === "confirmed"
                ? { text: "IN STOCK", bg: GREEN }
                : replyStatus === "partial"
                ? { text: "PARTIAL", bg: "#9F7400" }
                : replyStatus === "unavailable"
                ? { text: "UNAVAILABLE", bg: "#C0392B" }
                : replyStatus === "failed"
                ? { text: "SEND FAILED", bg: "#C0392B" }
                : { text: "AWAITING REPLY", bg: AGGREGATE };
            const isPartial = replyStatus === "partial";
            return (
              <div key={g.supplier.name} style={{ background: "#fff", border: `1.5px solid ${isPartial ? "#9F7400" : "#D8D3C6"}`, borderRadius: 6, padding: "14px 16px", marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 8 }}>
                  <div>
                    <p style={{ margin: 0, fontWeight: 700, fontSize: 14 }}>{g.supplier.name}</p>
                    <p style={{ margin: "2px 0 0", fontSize: 12, color: AGGREGATE }}>{emails[g.supplier.name]}</p>
                    {status && status.reply && status.reply.note && (
                      <p style={{ margin: "6px 0 0", fontSize: 13, fontStyle: "italic", color: isPartial ? "#9F7400" : CHARCOAL, borderLeft: isPartial ? "3px solid #9F7400" : "none", paddingLeft: isPartial ? 8 : 0 }}>"{status.reply.note}"</p>
                    )}
                    {result && !result.sent && (
                      <p style={{ margin: "6px 0 0", fontSize: 12, color: "#C0392B" }}>{result.reason}</p>
                    )}
                    {isPartial && (
                      <button
                        onClick={() => onResource && onResource({ supplierName: g.supplier.name, items: g.items, note: status && status.reply ? status.reply.note : "" })}
                        style={{ marginTop: 10, padding: "7px 14px", borderRadius: 4, border: "1.5px solid #9F7400", background: "transparent", color: "#9F7400", fontWeight: 700, fontSize: 12, cursor: "pointer" }}
                      >
                        Re-source missing items →
                      </button>
                    )}
                  </div>
                  <span style={{ background: badge.bg, color: "#fff", fontSize: 11, fontWeight: 700, padding: "3px 9px", borderRadius: 3, letterSpacing: 0.4 }}>
                    {badge.text}
                  </span>
                </div>
              </div>
            );
          })}

          <div style={{ display: "flex", gap: 10, marginTop: 14, flexWrap: "wrap" }}>
            <button
              onClick={onAllConfirmed}
              style={{
                flex: "1 1 200px",
                padding: "12px 22px",
                borderRadius: 4,
                border: `1.5px solid ${CHARCOAL}`,
                background: "transparent",
                color: CHARCOAL,
                fontWeight: 700,
                fontSize: 13,
                cursor: "pointer",
              }}
            >
              Continue to delivery tracking →
            </button>
            <button
              onClick={onBackToDashboard}
              style={{
                flex: "0 0 auto",
                padding: "12px 22px",
                borderRadius: 4,
                border: `1.5px solid #D8D3C6`,
                background: "transparent",
                color: AGGREGATE,
                fontWeight: 600,
                fontSize: 13,
                cursor: "pointer",
              }}
            >
              ← Back to dashboard
            </button>
          </div>
          <p style={{ fontSize: 11, color: AGGREGATE, marginTop: 8, textAlign: "center" }}>
            You don't have to wait for every reply — move on whenever you're ready.
          </p>
        </div>
      )}
    </div>
  );
}

function TrackingView({ order, inquiry, orderNumber, onBack }) {
  const bySupplier = useMemo(() => {
    const map = {};
    order.items.forEach((it) => {
      const key = it.chosen.name;
      if (!map[key]) map[key] = { supplier: it.chosen, items: [] };
      map[key].items.push(it);
    });
    return Object.values(map).map((g, i) => {
      const rng = seedRandom(g.supplier.name.length * 13 + i * 7);
      const progress = Math.min(3, Math.floor(rng() * 2) + (g.supplier.leadDays <= 3 ? 2 : 1));
      return { ...g, progress, leadDays: g.supplier.leadDays };
    });
  }, [order]);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
        <div>
          <Docket>{orderNumber}</Docket>
          <p style={{ margin: "10px 0 0", fontSize: 13, color: AGGREGATE }}>
            {order.items.length} items across {bySupplier.length} suppliers · generated today
          </p>
          <p style={{ margin: "6px 0 0", fontSize: 12, color: AGGREGATE, maxWidth: 460 }}>
            Call each merchant below to confirm price and place the order — tracking will update once you've
            booked delivery with them.
          </p>
        </div>
        <button onClick={onBack} style={ghostBtnStyle}>
          ← New inquiry
        </button>
      </div>

      <div
        style={{
          display: "flex",
          justifyContent: "space-between",
          background: "#fff",
          border: "1.5px solid #D8D3C6",
          borderRadius: 6,
          padding: "16px 20px",
          margin: "20px 0 28px",
        }}
      >
        <div>
          <p style={labelStyle}>Total order value</p>
          <p style={{ margin: "4px 0 0", fontSize: 22, fontWeight: 700, fontFamily: "var(--font-mono, monospace)" }}>
            £{order.total.toLocaleString(undefined, { maximumFractionDigits: 2 })}
          </p>
        </div>
        <div>
          <p style={labelStyle}>Latest delivery due</p>
          <p style={{ margin: "4px 0 0", fontSize: 22, fontWeight: 700 }}>{order.maxLead} days</p>
        </div>
        <div>
          <p style={labelStyle}>Suppliers</p>
          <p style={{ margin: "4px 0 0", fontSize: 22, fontWeight: 700 }}>{bySupplier.length}</p>
        </div>
      </div>

      {inquiry && (
        <div style={{ background: CARD, border: "1.5px solid #D8D3C6", borderRadius: 6, padding: "14px 18px", marginBottom: 28 }}>
          <p style={labelStyle}>Deliver to</p>
          <p style={{ margin: "4px 0 12px", fontSize: 14, fontWeight: 600 }}>{inquiry.address}</p>
          {inquiry.access && inquiry.access.length > 0 && (
            <>
              <p style={labelStyle}>Access notes — read this to every supplier</p>
              <ul style={{ margin: "6px 0 0", paddingLeft: 18 }}>
                {inquiry.access.map((a) => {
                  const label = ACCESS_OPTIONS.find(([id]) => id === a)?.[1] || a;
                  return (
                    <li key={a} style={{ fontSize: 13, marginBottom: 4 }}>
                      <strong>{label}:</strong> {inquiry.accessDetails && inquiry.accessDetails[a]}
                    </li>
                  );
                })}
              </ul>
            </>
          )}
        </div>
      )}

      <SectionLabel n="·">Delivery tracking</SectionLabel>


      {bySupplier.map((g, i) => (
        <div key={i} style={{ background: "#fff", border: "1.5px solid #D8D3C6", borderRadius: 6, padding: "16px 18px", marginBottom: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
            <div>
              <p style={{ margin: 0, fontWeight: 700, fontSize: 14 }}>{g.supplier.name}</p>
              <p style={{ margin: "2px 0 0", fontSize: 12, color: AGGREGATE }}>{g.supplier.address}</p>
              <p style={{ margin: "4px 0 0", fontSize: 12, color: AGGREGATE }}>
                {g.items.length} item{g.items.length > 1 ? "s" : ""} ·{" "}
                {g.items.map((it) => it.material).join(", ")}
              </p>
              <div style={{ display: "flex", gap: 14, marginTop: 8 }}>
                <a href={telLink(g.supplier.phone)} style={{ fontSize: 12, fontWeight: 600, color: ORANGE, textDecoration: "none" }}>
                  Call {g.supplier.phone}
                </a>
                <a
                  href={mapsLink(g.supplier)}
                  target="_blank"
                  rel="noopener noreferrer"
                  style={{ fontSize: 12, fontWeight: 600, color: CHARCOAL, textDecoration: "none", borderBottom: `1px dotted ${AGGREGATE}` }}
                >
                  View on map
                </a>
              </div>
            </div>
            <Docket>{g.progress === 3 ? "DELIVERED" : `ETA ${g.leadDays}D`}</Docket>
          </div>

          <div style={{ display: "flex", alignItems: "center" }}>
            {TRACK_STAGES.map((stage, si) => (
              <React.Fragment key={stage}>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", minWidth: 70 }}>
                  <div
                    style={{
                      width: 14,
                      height: 14,
                      borderRadius: "50%",
                      background: si <= g.progress ? GREEN : "#E2DDD0",
                      border: si === g.progress ? `2.5px solid ${GREEN}` : "none",
                    }}
                  />
                  <span
                    style={{
                      fontSize: 10.5,
                      textAlign: "center",
                      marginTop: 6,
                      color: si <= g.progress ? CHARCOAL : "#B5B0A2",
                      fontWeight: si === g.progress ? 700 : 500,
                      lineHeight: 1.3,
                    }}
                  >
                    {stage}
                  </span>
                </div>
                {si < TRACK_STAGES.length - 1 && (
                  <div style={{ flex: 1, height: 2, background: si < g.progress ? GREEN : "#E2DDD0", marginBottom: 18 }} />
                )}
              </React.Fragment>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function Dashboard({ onNewProject, onSelectProject }) {
  const [orders, setOrders] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState("");

  useEffect(() => {
    fetch(`${API_BASE_URL}/api/orders`)
      .then((r) => r.json())
      .then((data) => { setOrders(data.orders); setLoading(false); })
      .catch(() => { setError("Could not load projects. Make sure the server is running."); setLoading(false); });
  }, []);

  const projectStatusInfo = (order) => {
    const sups = Object.values(order.suppliers || {});
    const total = sups.length;
    if (total === 0) return { text: "AWAITING", bg: AGGREGATE };
    const replied = sups.filter((s) => s.status !== "sent");
    const confirmed = sups.filter((s) => s.status === "confirmed");
    const unavailable = sups.filter((s) => s.status === "unavailable");
    const partial = sups.filter((s) => s.status === "partial");
    if (replied.length === 0) return { text: "AWAITING", bg: AGGREGATE };
    if (unavailable.length > 0 || partial.length > 0) {
      if (confirmed.length > 0) return { text: "PARTIAL", bg: "#9F7400" };
      return { text: "SOME UNAVAILABLE", bg: "#C0392B" };
    }
    if (confirmed.length === total) return { text: "ALL CONFIRMED", bg: GREEN };
    return { text: "AWAITING", bg: AGGREGATE };
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 28 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 800, color: CHARCOAL }}>Projects</h2>
          <p style={{ margin: "4px 0 0", fontSize: 13, color: AGGREGATE }}>Each stock-check enquiry is a project. Click one to see supplier replies.</p>
        </div>
        <button
          onClick={onNewProject}
          style={{
            padding: "10px 20px",
            borderRadius: 4,
            border: "none",
            background: ORANGE,
            color: CREAM,
            fontWeight: 700,
            fontSize: 13,
            cursor: "pointer",
            letterSpacing: 0.3,
          }}
        >
          New project +
        </button>
      </div>

      {loading && <p style={{ color: AGGREGATE, fontSize: 13 }}>Loading projects…</p>}
      {error && <p style={{ color: "#C0392B", fontSize: 13 }}>{error}</p>}

      {orders && orders.length === 0 && (
        <div style={{ textAlign: "center", padding: "60px 24px", background: "#fff", border: "1.5px solid #D8D3C6", borderRadius: 6 }}>
          <p style={{ fontSize: 15, color: AGGREGATE, marginBottom: 20 }}>No projects yet. Start your first one.</p>
          <button
            onClick={onNewProject}
            style={{
              padding: "11px 24px",
              borderRadius: 4,
              border: "none",
              background: CHARCOAL,
              color: CREAM,
              fontWeight: 700,
              fontSize: 14,
              cursor: "pointer",
            }}
          >
            Start your first project →
          </button>
        </div>
      )}

      {orders && orders.length > 0 && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 14 }}>
          {orders.map((order) => {
            const pill = projectStatusInfo(order);
            const displayName = order.projectName || order.orderNumber;
            const date = new Date(order.createdAt).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
            return (
              <div
                key={order.orderNumber}
                onClick={() => onSelectProject(order)}
                style={{
                  width: 280,
                  background: "#fff",
                  border: "1.5px solid #D8D3C6",
                  borderRadius: 6,
                  padding: "16px 18px",
                  cursor: "pointer",
                  transition: "border-color 0.12s",
                  flexShrink: 0,
                }}
                onMouseEnter={(e) => e.currentTarget.style.borderColor = ORANGE}
                onMouseLeave={(e) => e.currentTarget.style.borderColor = "#D8D3C6"}
              >
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                  <p style={{ margin: 0, fontWeight: 700, fontSize: 14, color: CHARCOAL, flex: 1, paddingRight: 8 }}>{displayName}</p>
                  <span style={{ background: pill.bg, color: "#fff", fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 3, letterSpacing: 0.4, whiteSpace: "nowrap", flexShrink: 0 }}>
                    {pill.text}
                  </span>
                </div>
                {order.projectName && (
                  <p style={{ margin: "0 0 6px", fontSize: 11, color: AGGREGATE, fontFamily: "var(--font-mono, monospace)" }}>{order.orderNumber}</p>
                )}
                <p style={{ margin: "0 0 4px", fontSize: 12, color: AGGREGATE }}>{order.deliveryAddress}</p>
                <p style={{ margin: "0 0 10px", fontSize: 12, color: AGGREGATE }}>{date}</p>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 12, borderTop: "1px solid #EEEAE0", paddingTop: 10, marginTop: 4 }}>
                  <span style={{ color: AGGREGATE }}>{order.totalSuppliers} supplier{order.totalSuppliers !== 1 ? "s" : ""}</span>
                  <span style={{ color: order.repliedCount === order.totalSuppliers && order.totalSuppliers > 0 ? GREEN : AGGREGATE, fontWeight: 600 }}>
                    {order.repliedCount}/{order.totalSuppliers} replied
                  </span>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function ProjectDetailView({ project, onBack, onResource }) {
  const statusBadge = (status) => {
    if (status === "confirmed")   return { text: "IN STOCK",      bg: GREEN };
    if (status === "partial")     return { text: "PARTIAL",        bg: "#9F7400" };
    if (status === "unavailable") return { text: "UNAVAILABLE",    bg: "#C0392B" };
    if (status === "failed")      return { text: "SEND FAILED",    bg: "#C0392B" };
    return                               { text: "AWAITING REPLY", bg: AGGREGATE };
  };

  const suppliers = Object.values(project.suppliers || {});
  const displayName = project.projectName || project.orderNumber;
  const date = new Date(project.createdAt).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });

  return (
    <div>
      <button onClick={onBack} style={{ ...ghostBtnStyle, marginBottom: 20 }}>
        ← Back to dashboard
      </button>

      <div style={{ marginBottom: 24 }}>
        <h2 style={{ margin: "0 0 4px", fontSize: 22, fontWeight: 800, color: CHARCOAL }}>{displayName}</h2>
        {project.projectName && (
          <Docket>{project.orderNumber}</Docket>
        )}
        <p style={{ margin: "10px 0 2px", fontSize: 13, color: AGGREGATE }}>
          <strong style={{ color: CHARCOAL }}>Delivery:</strong> {project.deliveryAddress}
        </p>
        <p style={{ margin: "2px 0", fontSize: 13, color: AGGREGATE }}>
          <strong style={{ color: CHARCOAL }}>Timeframe:</strong> {project.timeframe} &nbsp;·&nbsp; {date}
        </p>
        <p style={{ margin: "2px 0", fontSize: 13, color: AGGREGATE }}>
          {project.repliedCount}/{project.totalSuppliers} supplier{project.totalSuppliers !== 1 ? "s" : ""} replied
        </p>
      </div>

      <SectionLabel n="·">Supplier replies</SectionLabel>

      {suppliers.length === 0 && (
        <p style={{ fontSize: 13, color: AGGREGATE }}>No supplier data on record for this project.</p>
      )}

      {suppliers.map((sup) => {
        const badge = statusBadge(sup.status);
        const isPartial = sup.status === "partial";
        const borderColor = sup.status === "confirmed" ? GREEN : sup.status === "partial" ? "#9F7400" : sup.status === "unavailable" ? "#C0392B" : "#D8D3C6";
        return (
          <div key={sup.supplierName + sup.sentAt} style={{ background: "#fff", border: `1.5px solid ${borderColor}`, borderRadius: 6, padding: "14px 16px", marginBottom: 10 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 8 }}>
              <div style={{ flex: 1 }}>
                <p style={{ margin: 0, fontWeight: 700, fontSize: 14 }}>{sup.supplierName}</p>
                <p style={{ margin: "2px 0 6px", fontSize: 12, color: AGGREGATE }}>
                  {(sup.items || []).map((it) => `${it.material} ×${it.qty}`).join(", ")}
                </p>
                {sup.reply && sup.reply.note && (
                  <p style={{ margin: "6px 0 0", fontSize: 13, fontStyle: "italic", color: isPartial ? "#9F7400" : CHARCOAL, borderLeft: isPartial ? "3px solid #9F7400" : "none", paddingLeft: isPartial ? 8 : 0 }}>
                    "{sup.reply.note}"
                  </p>
                )}
                {isPartial && onResource && (
                  <button
                    onClick={() => onResource({ supplierName: sup.supplierName, items: sup.items || [], note: sup.reply ? sup.reply.note : "" })}
                    style={{ marginTop: 10, padding: "7px 14px", borderRadius: 4, border: "1.5px solid #9F7400", background: "transparent", color: "#9F7400", fontWeight: 700, fontSize: 12, cursor: "pointer" }}
                  >
                    Re-source missing items →
                  </button>
                )}
              </div>
              <span style={{ background: badge.bg, color: "#fff", fontSize: 11, fontWeight: 700, padding: "3px 9px", borderRadius: 3, letterSpacing: 0.4, whiteSpace: "nowrap" }}>
                {badge.text}
              </span>
            </div>
          </div>
        );
      })}
    </div>
  );
}


function App() {
  // view: "dashboard" | "new-project" | "project-detail"
  const [view, setView] = useState("dashboard");
  const [step, setStep] = useState(0);
  const [inquiry, setInquiry] = useState(null);
  const [quotes, setQuotes] = useState(null);
  const [bundles, setBundles] = useState(null);
  const [order, setOrder] = useState(null);
  const [orderNumber, setOrderNumber] = useState(null);
  const [builderEmail, setBuilderEmail] = useState("");
  const [projectName, setProjectName] = useState("");
  const [selectedProject, setSelectedProject] = useState(null);
  const [resourcingItems, setResourcingItems] = useState(null);
  const [resourcingFrom, setResourcingFrom] = useState("");
  const [resourcingNote, setResourcingNote] = useState("");

  const handleInquirySubmit = (data) => {
    const q = generateQuotes(data.materials, data.scale, data.timeframe, data.buffer);
    setInquiry(data);
    setQuotes(q);
    setBundles(buildBundles(q, data.timeframe));
    setResourcingItems(null);
    setResourcingFrom("");
    setResourcingNote("");
    setStep(1);
  };

  const handleSelectBundle = (b) => {
    setOrder(b);
    setOrderNumber("ORD-" + Math.floor(100000 + Math.random() * 900000));
    setStep(2);
  };

  const handleResource = ({ supplierName, items, note }) => {
    setResourcingItems(items);
    setResourcingFrom(supplierName);
    setResourcingNote(note || "");
    setStep(0);
    setView("new-project");
  };

  const resetToNewProject = () => {
    setStep(0);
    setInquiry(null);
    setQuotes(null);
    setBundles(null);
    setOrder(null);
    setOrderNumber(null);
    setProjectName("");
    setResourcingItems(null);
    setResourcingFrom("");
    setResourcingNote("");
    setView("new-project");
  };

  const goToDashboard = () => {
    setStep(0);
    setInquiry(null);
    setQuotes(null);
    setBundles(null);
    setOrder(null);
    setOrderNumber(null);
    setProjectName("");
    setResourcingItems(null);
    setResourcingFrom("");
    setResourcingNote("");
    setSelectedProject(null);
    setView("dashboard");
  };

  const handleSelectProject = (project) => {
    setSelectedProject(project);
    setView("project-detail");
  };

  const handleResourceFromDetail = ({ supplierName, items, note }) => {
    setResourcingItems(items);
    setResourcingFrom(supplierName);
    setResourcingNote(note || "");
    setStep(0);
    setView("new-project");
  };

  return (
    <div style={{ fontFamily: "var(--font-sans, sans-serif)", background: CREAM, minHeight: "100vh", color: CHARCOAL }}>
      <div style={{ background: CHARCOAL, padding: "18px 0" }}>
        <div style={{ maxWidth: 880, margin: "0 auto", padding: "0 24px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div
            onClick={goToDashboard}
            style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }}
          >
            <div style={{ width: 28, height: 28, background: ORANGE, borderRadius: 4, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 14, color: CHARCOAL }}>
              M
            </div>
            <span style={{ color: CREAM, fontWeight: 700, fontSize: 16, letterSpacing: 0.3 }}>MaterialOrder</span>
          </div>
          <span style={{ color: "#8A8579", fontSize: 12, fontFamily: "var(--font-mono, monospace)" }}>
            BUILD PROCUREMENT
          </span>
        </div>
      </div>

      <div style={{ maxWidth: 880, margin: "0 auto", padding: "32px 24px 80px" }}>
        {view === "dashboard" && (
          <Dashboard
            onNewProject={resetToNewProject}
            onSelectProject={handleSelectProject}
          />
        )}

        {view === "project-detail" && selectedProject && (
          <ProjectDetailView
            project={selectedProject}
            onBack={() => setView("dashboard")}
            onResource={handleResourceFromDetail}
          />
        )}

        {view === "new-project" && (
          <>
            <Stepper step={step} />
            {step === 0 && (
              <InquiryForm
                onSubmit={handleInquirySubmit}
                prefillItems={resourcingItems}
                resourcingFrom={resourcingFrom}
                resourcingNote={resourcingNote}
              />
            )}
            {step === 1 && inquiry && (
              <BundleView inquiry={inquiry} quotes={quotes} bundles={bundles} onSelect={handleSelectBundle} onBack={() => setStep(0)} />
            )}
            {step === 2 && order && (
              <StockCheckView
                order={order}
                inquiry={inquiry}
                orderNumber={orderNumber}
                onAllConfirmed={() => setStep(3)}
                onBack={() => setStep(1)}
                onResource={handleResource}
                builderEmail={builderEmail}
                onBuilderEmailChange={setBuilderEmail}
                projectName={projectName}
                onProjectNameChange={setProjectName}
                onBackToDashboard={goToDashboard}
              />
            )}
            {step === 3 && order && (
              <TrackingView order={order} inquiry={inquiry} orderNumber={orderNumber} onBack={goToDashboard} />
            )}
          </>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
